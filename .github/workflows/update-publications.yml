name: Update Publications

on:
  schedule:
    # Every Sunday at 02:00 UTC
    - cron: "0 2 * * 0"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-publications:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Update publications from ORCID
        run: python update_orcid.py

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Render Quarto website
        run: quarto render

      - name: Commit updated publications and website
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add publications.bib docs/

          if git diff --cached --quiet; then
            echo "No publication changes detected."
          else
            git commit -m "Automatic ORCID publication update"
            git push
          fi